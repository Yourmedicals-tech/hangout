<title>Hangout — walkthrough prototype</title>

<style>
  :root {
    --ink:#0F1512; --ink-2:#3D4A43; --ink-3:#6B7A72;
    --paper:#E8EAE4; --card:#FCFDFB; --card-2:#F1F3EE;
    --line:#C9CEC5; --line-soft:#DEE2DA;
    --accent:#E8452F; --accent-ink:#FFFFFF; --accent-wash:#FCE9E5;
    --court:#0B6E4F; --court-wash:#DDEDE5;
    --bezel:#12180F;
    --shadow:0 1px 2px rgba(15,21,18,.06), 0 24px 60px -20px rgba(15,21,18,.35);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --ink:#E9ECE5; --ink-2:#A9B4AC; --ink-3:#7C8981;
      --paper:#0A0E0C; --card:#171F1A; --card-2:#1E2721;
      --line:#2C382F; --line-soft:#232D26;
      --accent:#FF6248; --accent-ink:#1A0B07; --accent-wash:#3A1A13;
      --court:#35BE8B; --court-wash:#16302650;
      --bezel:#000000;
      --shadow:0 1px 2px rgba(0,0,0,.5), 0 24px 60px -20px rgba(0,0,0,.8);
    }
  }
  :root[data-theme="dark"] {
    --ink:#E9ECE5; --ink-2:#A9B4AC; --ink-3:#7C8981;
    --paper:#0A0E0C; --card:#171F1A; --card-2:#1E2721;
    --line:#2C382F; --line-soft:#232D26;
    --accent:#FF6248; --accent-ink:#1A0B07; --accent-wash:#3A1A13;
    --court:#35BE8B; --court-wash:#16302650;
    --bezel:#000000;
    --shadow:0 1px 2px rgba(0,0,0,.5), 0 24px 60px -20px rgba(0,0,0,.8);
  }
  :root[data-theme="light"] {
    --ink:#0F1512; --ink-2:#3D4A43; --ink-3:#6B7A72;
    --paper:#E8EAE4; --card:#FCFDFB; --card-2:#F1F3EE;
    --line:#C9CEC5; --line-soft:#DEE2DA;
    --accent:#E8452F; --accent-ink:#FFFFFF; --accent-wash:#FCE9E5;
    --court:#0B6E4F; --court-wash:#DDEDE5;
    --bezel:#12180F;
    --shadow:0 1px 2px rgba(15,21,18,.06), 0 24px 60px -20px rgba(15,21,18,.35);
  }

  * { box-sizing: border-box; }
  body {
    margin:0; min-height:100vh; background:var(--paper); color:var(--ink);
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing:antialiased; line-height:1.5;
    display:flex; align-items:center; justify-content:center; padding:0;
  }
  #device {
    width:100%; max-width:390px; height:100vh; max-height:844px;
    background:var(--card); position:relative; overflow:hidden;
    display:flex; flex-direction:column;
  }
  @media (min-width:640px) and (min-height:700px) {
    body { padding:32px; }
    #device {
      border-radius:44px; box-shadow:var(--shadow);
      outline:10px solid var(--bezel); outline-offset:0;
      height:844px;
    }
  }

  /* status bar */
  .status {
    display:flex; justify-content:space-between; align-items:center;
    padding:14px 24px 2px; font-size:12px; font-weight:650;
    font-variant-numeric:tabular-nums; flex:none;
  }
  .status .r { display:flex; gap:4px; align-items:center; }
  .status .r i { width:3px; height:3px; border-radius:50%; background:currentColor; display:block; }
  .status .b { width:20px; height:10px; border:1.3px solid currentColor; border-radius:3px; position:relative; }
  .status .b::after { content:""; position:absolute; inset:1.6px; right:6px; background:currentColor; border-radius:1px; }

  /* nav */
  .nav {
    flex:none; padding:6px 20px 10px;
    display:flex; align-items:center; gap:12px; min-height:48px;
  }
  .nav .titles { min-width:0; flex:1; }
  .nav h1 { margin:0; font-size:22px; font-weight:750; letter-spacing:-.025em; line-height:1.2; }
  .nav .sub { font-size:11.5px; color:var(--ink-3); font-weight:550; }
  .nav .back {
    font-size:26px; line-height:1; color:var(--ink-2); background:none; border:0;
    padding:0 2px 4px 0; cursor:pointer; font-family:inherit; flex:none;
  }
  .nav .act {
    background:none; border:0; font:inherit; font-size:14px; font-weight:650;
    color:var(--accent); cursor:pointer; flex:none; padding:0;
  }

  /* scroll body */
  main {
    flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch;
    padding:2px 20px 20px; display:flex; flex-direction:column; gap:12px;
  }
  main.center { justify-content:center; text-align:center; align-items:center; }
  main::-webkit-scrollbar { width:0; }

  h2.sec {
    font-size:10.5px; font-weight:700; letter-spacing:.1em; text-transform:uppercase;
    color:var(--ink-3); margin:8px 0 -4px;
  }
  p.copy { margin:0; font-size:14px; color:var(--ink-2); line-height:1.55; }

  /* buttons */
  .btn {
    border:0; border-radius:999px; padding:14px 22px;
    font:inherit; font-size:15px; font-weight:700; letter-spacing:-.01em;
    background:var(--accent); color:var(--accent-ink); cursor:pointer;
    transition:transform .12s ease, opacity .15s ease; width:100%;
  }
  .btn:active { transform:scale(.97); }
  .btn:focus-visible { outline:2px solid var(--ink); outline-offset:2px; }
  .btn.sm { padding:9px 16px; font-size:12.5px; width:auto; }
  .btn.ghost { background:transparent; color:var(--ink); border:1px solid var(--line); }
  .btn.dark { background:var(--ink); color:var(--paper); }
  .btn.green { background:var(--court); color:#fff; }
  .btn.flat { background:transparent; color:var(--ink-3); font-weight:600; font-size:13px; padding:10px; }
  .btn[disabled] { opacity:.4; cursor:default; }

  /* inputs */
  .field { display:flex; flex-direction:column; gap:5px; }
  .field label {
    font-size:10.5px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-3);
  }
  .field input, .field select, .field textarea {
    font:inherit; font-size:16px; color:var(--ink); background:var(--card);
    border:1px solid var(--line); border-radius:12px; padding:13px 14px; width:100%;
    -webkit-appearance:none; appearance:none;
  }
  .field textarea { resize:none; min-height:64px; font-size:15px; }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline:none; border-color:var(--ink); }
  .field select {
    background-image:linear-gradient(45deg,transparent 50%,var(--ink-3) 50%),linear-gradient(135deg,var(--ink-3) 50%,transparent 50%);
    background-position:calc(100% - 18px) 21px, calc(100% - 13px) 21px;
    background-size:5px 5px, 5px 5px; background-repeat:no-repeat;
  }
  .two { display:flex; gap:10px; } .two > * { flex:1; min-width:0; }

  /* interest picker */
  .pick {
    display:flex; align-items:center; gap:13px; width:100%; text-align:left;
    border:1.5px solid var(--line); border-radius:16px; padding:15px;
    background:var(--card); color:var(--ink); font:inherit; cursor:pointer;
    transition:border-color .15s ease, background .15s ease;
  }
  .pick[aria-pressed="true"] { border-color:var(--ink); background:var(--card-2); }
  .pick .ico { font-size:26px; line-height:1; flex:none; }
  .pick .t b { display:block; font-size:15.5px; font-weight:680; letter-spacing:-.01em; }
  .pick .t span { font-size:12px; color:var(--ink-2); }
  .pick .tick {
    margin-left:auto; width:22px; height:22px; border-radius:50%; flex:none;
    border:1.5px solid var(--line); display:grid; place-items:center;
    font-size:12px; color:transparent;
  }
  .pick[aria-pressed="true"] .tick { background:var(--ink); border-color:var(--ink); color:var(--paper); }
  .pick[disabled] { opacity:.4; cursor:default; }

  .chips { display:flex; flex-wrap:wrap; gap:7px; }
  .chip {
    font:inherit; font-size:12.5px; font-weight:600; padding:8px 14px; border-radius:999px;
    border:1px solid var(--line); color:var(--ink-2); background:var(--card); cursor:pointer;
  }
  .chip[aria-pressed="true"] { background:var(--ink); border-color:var(--ink); color:var(--paper); }

  /* game card */
  .gc {
    border:1px solid var(--line-soft); border-radius:18px; background:var(--card);
    padding:13px 14px; display:flex; flex-direction:column; gap:10px;
    cursor:pointer; text-align:left; font:inherit; color:var(--ink); width:100%;
    transition:transform .12s ease;
  }
  .gc:active { transform:scale(.985); }
  .gc.urgent { border-color:var(--accent); background:var(--accent-wash); }
  .gc.filled { border-color:var(--court); background:var(--court-wash); }
  .gc .top { display:flex; align-items:center; gap:8px; }
  .gc .kind { font-size:10px; font-weight:700; letter-spacing:.07em; text-transform:uppercase; color:var(--ink-3); }
  .gc.urgent .kind { color:var(--accent); }
  .gc.filled .kind { color:var(--court); }
  .gc .when { margin-left:auto; font-size:11.5px; color:var(--ink-3); font-weight:650; font-variant-numeric:tabular-nums; }
  .gc h3 { margin:0; font-size:17px; font-weight:700; letter-spacing:-.02em; line-height:1.25; }
  .gc .meta { font-size:12.5px; color:var(--ink-2); display:flex; gap:7px; align-items:center; flex-wrap:wrap; }
  .gc .meta i { width:3px; height:3px; border-radius:50%; background:var(--ink-3); display:block; flex:none; }
  .gc .foot { display:flex; align-items:center; gap:10px; }

  .slots { display:flex; align-items:center; }
  .slots > * + * { margin-left:-7px; }
  .pip {
    width:28px; height:28px; border-radius:50%; border:2px solid var(--card);
    display:grid; place-items:center; font-size:10.5px; font-weight:700; color:#fff;
    background:var(--ink-2); flex:none;
  }
  .gc.urgent .pip { border-color:var(--accent-wash); }
  .gc.filled .pip { border-color:var(--court-wash); }
  .pip.empty { background:transparent; border:2px dashed var(--accent); color:var(--accent); font-weight:500; font-size:14px; }
  .gc.filled .pip.empty { border:2px solid var(--court); background:var(--court); color:#fff; }
  .count { font-size:12.5px; font-weight:750; font-variant-numeric:tabular-nums; color:var(--ink-2); margin-left:5px; }
  .gc.urgent .count { color:var(--accent); }
  .gc.filled .count { color:var(--court); }
  .gc .foot .btn { margin-left:auto; }

  @keyframes pop { 0%{transform:scale(.3);opacity:0} 65%{transform:scale(1.18)} 100%{transform:scale(1);opacity:1} }
  .pop { animation:pop .45s cubic-bezier(.3,1.5,.5,1) both; }
  @keyframes slidein { from{transform:translateY(-120%);opacity:0} to{transform:translateY(0);opacity:1} }
  @keyframes fadeup { from{transform:translateY(8px);opacity:0} to{transform:translateY(0);opacity:1} }
  main > * { animation:fadeup .3s ease both; }
  @media (prefers-reduced-motion:reduce) { *,main>* { animation:none!important; transition:none!important; } }

  /* rows */
  .row {
    display:flex; align-items:center; gap:12px; width:100%; text-align:left;
    padding:12px 0; border-bottom:1px solid var(--line-soft);
    background:none; border-left:0; border-right:0; border-top:0; font:inherit; color:var(--ink); cursor:pointer;
  }
  .row:last-child { border-bottom:0; }
  .row .t { flex:1; min-width:0; }
  .row .t b { display:block; font-size:15px; font-weight:680; letter-spacing:-.01em; }
  .row .t span { display:block; font-size:12px; color:var(--ink-2); line-height:1.45; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .row .far { font-size:11.5px; color:var(--ink-3); font-weight:650; font-variant-numeric:tabular-nums; flex:none; }
  .av {
    width:42px; height:42px; border-radius:50%; flex:none; display:grid; place-items:center;
    color:#fff; font-weight:700; font-size:14px;
  }
  .av.sm { width:30px; height:30px; font-size:11px; }
  .tag { display:inline-block; font-size:10px; font-weight:650; padding:2px 7px; border-radius:5px;
    background:var(--card-2); color:var(--ink-2); margin-top:4px; }
  .tag.new { background:var(--accent-wash); color:var(--accent); }
  .dot { width:8px; height:8px; border-radius:50%; background:var(--accent); flex:none; }

  /* block */
  .block {
    border:1px solid var(--line-soft); border-radius:16px; padding:13px 14px;
    display:flex; flex-direction:column; gap:9px; background:var(--card);
  }
  .block .bh { font-size:10px; font-weight:700; letter-spacing:.09em; text-transform:uppercase; color:var(--ink-3); }
  .lr { display:flex; justify-content:space-between; align-items:center; gap:10px; font-size:13.5px; color:var(--ink-2); font-variant-numeric:tabular-nums; }
  .lr b { color:var(--ink); font-weight:700; }
  .lr.total { border-top:1px solid var(--line-soft); padding-top:9px; font-size:15px; }

  .link {
    display:flex; align-items:center; justify-content:space-between; gap:10px; width:100%; text-align:left;
    font:inherit; font-size:14px; font-weight:650; color:var(--ink); cursor:pointer;
    border:1px solid var(--line); border-radius:14px; padding:12px 14px; background:var(--card);
  }
  .link small { display:block; font-size:11.5px; font-weight:500; color:var(--ink-3); margin-top:1px; }
  .link .arw { color:var(--ink-3); font-size:15px; flex:none; }
  .link.done { border-color:var(--court); background:var(--court-wash); }
  .link.done .arw { color:var(--court); }

  .reach { background:var(--ink); color:var(--paper); border-radius:14px; padding:13px 15px; font-size:13px; line-height:1.5; }
  .reach b { font-weight:750; font-variant-numeric:tabular-nums; }

  /* empty */
  .empty { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:11px; text-align:center; flex:1; padding:20px 0; }
  .empty .mark { width:62px; height:62px; border-radius:50%; border:2px dashed var(--accent); color:var(--accent);
    display:grid; place-items:center; font-size:26px; font-weight:300; }
  .empty h3 { margin:6px 0 0; font-size:19px; font-weight:750; letter-spacing:-.02em; }
  .empty p { margin:0; font-size:13.5px; color:var(--ink-2); line-height:1.55; max-width:30ch; }
  .empty .btn { margin-top:8px; max-width:240px; }

  /* chat */
  .thread { display:flex; flex-direction:column; gap:9px; padding-top:6px; }
  .msg { max-width:80%; padding:10px 13px; border-radius:18px; font-size:14px; line-height:1.45;
    background:var(--card-2); color:var(--ink); border-bottom-left-radius:5px; align-self:flex-start;
    animation:fadeup .25s ease both; }
  .msg.me { align-self:flex-end; background:var(--ink); color:var(--paper);
    border-bottom-left-radius:18px; border-bottom-right-radius:5px; }
  .msg .t { display:block; font-size:10px; opacity:.55; margin-top:4px; font-variant-numeric:tabular-nums; }
  .msg .who { display:block; font-size:10.5px; font-weight:700; opacity:.6; margin-bottom:2px; }
  .composer { flex:none; display:flex; gap:8px; align-items:center; padding:10px 20px 18px; border-top:1px solid var(--line-soft); }
  .composer input {
    flex:1; font:inherit; font-size:16px; color:var(--ink); background:var(--card-2);
    border:1px solid transparent; border-radius:999px; padding:11px 16px; -webkit-appearance:none;
  }
  .composer input:focus { outline:none; border-color:var(--line); }
  .composer button { background:none; border:0; font:inherit; font-size:14px; font-weight:750; color:var(--accent); cursor:pointer; padding:6px; flex:none; }

  /* profile head */
  .phead { display:flex; flex-direction:column; align-items:center; gap:6px; padding:10px 0 2px; }
  .phead .av { width:70px; height:70px; font-size:24px; }
  .phead b { font-size:20px; font-weight:750; letter-spacing:-.02em; }
  .phead span { font-size:12.5px; color:var(--ink-3); }
  .stats { display:flex; border:1px solid var(--line-soft); border-radius:14px; overflow:hidden; }
  .stats div { flex:1; text-align:center; padding:11px 4px; border-right:1px solid var(--line-soft); }
  .stats div:last-child { border-right:0; }
  .stats b { display:block; font-size:19px; font-weight:750; font-variant-numeric:tabular-nums; letter-spacing:-.02em; }
  .stats span { font-size:9.5px; color:var(--ink-3); font-weight:700; letter-spacing:.05em; }

  .toggle { width:44px; height:26px; border-radius:999px; background:var(--line); position:relative; flex:none;
    border:0; cursor:pointer; transition:background .18s ease; }
  .toggle::after { content:""; position:absolute; top:3px; left:3px; width:20px; height:20px; border-radius:50%;
    background:#fff; transition:transform .18s ease; box-shadow:0 1px 3px rgba(0,0,0,.25); }
  .toggle[aria-pressed="true"] { background:var(--court); }
  .toggle[aria-pressed="true"]::after { transform:translateX(18px); }

  /* tabs */
  nav.tabs { flex:none; display:flex; border-top:1px solid var(--line-soft); padding:8px 6px 20px; background:var(--card); }
  nav.tabs button {
    flex:1; background:none; border:0; font:inherit; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; gap:3px;
    font-size:9.5px; font-weight:650; color:var(--ink-3); padding:4px 0; position:relative;
  }
  nav.tabs button[aria-current="page"] { color:var(--ink); }
  nav.tabs svg { width:21px; height:21px; opacity:.5; }
  nav.tabs button[aria-current="page"] svg { opacity:1; }
  nav.tabs .badge {
    position:absolute; top:0; right:calc(50% - 16px); min-width:16px; height:16px; padding:0 4px;
    background:var(--accent); color:var(--accent-ink); border-radius:999px;
    font-size:9.5px; font-weight:750; display:grid; place-items:center; font-variant-numeric:tabular-nums;
  }

  /* cta bar */
  .cta { flex:none; display:flex; align-items:center; gap:12px; padding:12px 20px 20px; border-top:1px solid var(--line-soft); background:var(--card); }
  .cta .price { font-size:11.5px; color:var(--ink-3); font-weight:650; flex:none; }
  .cta .price b { display:block; font-size:17px; color:var(--ink); font-weight:750; font-variant-numeric:tabular-nums; }
  .cta .btn { width:auto; flex:1; }

  /* push banner */
  #push {
    position:absolute; top:10px; left:12px; right:12px; z-index:50;
    background:var(--ink); color:var(--paper); border-radius:18px; padding:12px 14px;
    display:none; gap:11px; align-items:center; cursor:pointer; text-align:left;
    box-shadow:0 12px 32px -8px rgba(0,0,0,.5); border:0; font:inherit; width:calc(100% - 24px);
  }
  #push.show { display:flex; animation:slidein .35s cubic-bezier(.2,1,.3,1) both; }
  #push .ic { width:32px; height:32px; border-radius:9px; background:var(--accent); color:var(--accent-ink);
    display:grid; place-items:center; font-size:15px; flex:none; }
  #push .t { min-width:0; }
  #push .t b { display:block; font-size:13px; font-weight:700; }
  #push .t span { display:block; font-size:12px; opacity:.75; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

  /* toast */
  #toast {
    position:absolute; bottom:96px; left:50%; transform:translateX(-50%);
    background:var(--ink); color:var(--paper); padding:11px 18px; border-radius:999px;
    font-size:13px; font-weight:600; z-index:60; display:none; white-space:nowrap;
    box-shadow:0 8px 24px -6px rgba(0,0,0,.4);
  }
  #toast.show { display:block; animation:fadeup .25s ease both; }

  /* sheet */
  #sheet { position:absolute; inset:0; z-index:70; display:none; }
  #sheet.show { display:block; }
  #sheet .scrim { position:absolute; inset:0; background:rgba(8,12,10,.5); border:0; width:100%; cursor:pointer; }
  #sheet .panel {
    position:absolute; left:0; right:0; bottom:0; background:var(--card);
    border-radius:24px 24px 0 0; padding:22px 20px 26px;
    display:flex; flex-direction:column; gap:12px;
    animation:slideup .3s cubic-bezier(.2,1,.3,1) both;
  }
  @keyframes slideup { from{transform:translateY(100%)} to{transform:translateY(0)} }
  #sheet h3 { margin:0; font-size:19px; font-weight:750; letter-spacing:-.02em; }
  #sheet p { margin:0; font-size:13.5px; color:var(--ink-2); line-height:1.55; }

  .brand {
    font-size:44px; font-weight:800; letter-spacing:-.045em; margin:0;
    line-height:1;
  }
  .brand em { font-style:normal; color:var(--accent); }
  .demo-note { font-size:11px; color:var(--ink-3); text-align:center; line-height:1.5; }
</style>

<div id="device">
  <div class="status"><span id="clock">9:41</span><span class="r"><i></i><i></i><i></i><span class="b"></span></span></div>
  <button id="push" type="button"></button>
  <div id="root" style="flex:1; display:flex; flex-direction:column; min-height:0;"></div>
  <div id="toast"></div>
  <div id="sheet"></div>
</div>

<script>
(function () {
  "use strict";

  /* ---------------- data ---------------- */
  var KEY = "hangout.v1";
  var COLORS = { AR:"#3C7A5A", PR:"#7A4E9B", TM:"#2F6F8F", RJ:"#B0653C", ME:"#8F4358", DK:"#4A6B8A", CW:"#6B7A3C" };
  var NEARBY = { badminton: 38, cricket: 12 };

  var PEOPLE = [

  /* days: 0=Sun..6=Sat -> ms timestamp of next such day */
  function nextDow(dow) {
    var d = new Date(); d.setHours(0,0,0,0);

    if (diff === 0) diff = 7;
    d.setDate(d.getDate() + diff);
    return d.getTime();
  }
  var DAYS = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  function whenLabel(ts) {
    var d = new Date(ts), n = new Date(); n.setHours(0,0,0,0);
    var days = Math.round((d - n) / 86400000);
    if (days === 0) return "Today";
    if (days === 1) return "Tomorrow";
    if (days < 7) return DAYS[d.getDay()];
    return DAYS[d.getDay()].slice(0,3) + " " + d.getDate();
  }
  function agoLabel(mins) {
    if (mins < 60) return mins + "m";

  function save() { try { localStorage.setItem(KEY, JSON.stringify(S)); } catch (e) {} }
  function reset() { S = fresh(); save(); go("welcome"); }

  function game(id) { for (var i=0;i<S.games.length;i++) if (S.games[i].id===id) return S.games[i]; return null; }

  function myGames() { return S.games.filter(inGame); }
  function share(g) { return g.cost > 0 ? g.cost / Math.max(g.players.length, 1) : 0; }
  function unread() {
    var n = 0;
    for (var k in S.chats) if (S.chats[k].unread) n += S.chats[k].unread;
    return n;

    gs.sort(function (a, b) {

      if (an !== bn) return an ? -1 : 1;
      return a.day - b.day;
    });
    return gs;
  }

  function card(g) {

  /* ---------------- push + toast + sheet ---------------- */

  var sheetEl = document.getElementById("sheet");
  var pushT, toastT, pushTarget = null;

  function push(icon, title, body, target) {
    if (!S.notify) return;
    pushTarget = target;
    pushEl.innerHTML = '<span class="ic">' + icon + '</span><span class="t"><b>' + esc(title) +
      "</b><span>" + esc(body) + "</span></span>";
    pushEl.classList.remove("show");
    void pushEl.offsetWidth;
    pushEl.classList.add("show");
    clearTimeout(pushT);
    pushT = setTimeout(function () { pushEl.classList.remove("show"); }, 5200);
  }
  pushEl.addEventListener("click", function () {
    pushEl.classList.remove("show");
    if (pushTarget) go(pushTarget.name, pushTarget.arg);
  });

  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.remove("show");
    void toastEl.offsetWidth;
    toastEl.classList.add("show");
    clearTimeout(toastT);
    toastT = setTimeout(function () { toastEl.classList.remove("show"); }, 2200);
  }

        return '<button class="btn ' + (a.cls || "") + '" data-act="' + a.act + '"' +
          (a.id ? ' data-id="' + a.id + '"' : "") + ">" + a.label + "</button>";
      }).join("") + "</div>";
    sheetEl.classList.add("show");
  }
  function closeSheet() { sheetEl.classList.remove("show"); sheetEl.innerHTML = ""; }

  /* ---------------- actions ---------------- */
  var A = {};

  A["demo-signin"] = function () {
    S.user = { name:"Shiv", ini:"S", plays:["cricket","badminton"], pc:"LE18", radius:10, isNew:false };

    if (!name) { toast("What should we call you?"); document.getElementById("f-name").focus(); return; }
    if (!email || email.indexOf("@") === -1) { toast("That email doesn't look right"); document.getElementById("f-email").focus(); return; }
    if (pass.length < 6) { toast("Password needs 6+ characters"); document.getElementById("f-pass").focus(); return; }
    S.draft = { name:name, plays:[], pc:"LE18", radius:10, isNew:false };

    go("pick");

  A["toggle-play"] = function (el) {
    var id = el.getAttribute("data-id");
    var i = S.draft.plays.indexOf(id);
    if (i === -1) S.draft.plays.push(id); else S.draft.plays.splice(i, 1);
    save(); render();
  };
  A.soon = function () { toast("Not yet — cricket and badminton first"); };
  A["to-place"] = function () { go("place"); };
  A["toggle-new"] = function () { S.draft.isNew = !S.draft.isNew; save(); render(); };

  A.finish = function () {
    var pc = (document.getElementById("f-pc").value || "LE18").trim().toUpperCase();
    var rad = parseInt(document.getElementById("f-rad").value, 10) || 10;
    var d = S.draft;
    var ini = d.name.trim().split(/\s+/).map(function (w) { return w[0]; }).join("").slice(0, 2).toUpperCase();
    S.user = { name:d.name, ini:ini, plays:d.plays, pc:pc, radius:rad, isNew:d.isNew };
    S.onboarded = true;
    S.post = defaultPost(d.plays[0]);
    delete S.draft;
    save();
    stack = [];
    go("home", null, true);
    setTimeout(function () {
      var g = feed().filter(function (x) { return x.players.length < x.need; })[0];
      if (g) {
        var h = person(g.host);
        push("🔔", h.first + " needs a player", g.title + " · " + whenLabel(g.day) + " " + g.time, { name:"game", arg:g.id });
      }
    }, 1600);

  A.join = function (el) {
    var g = game(el.getAttribute("data-id"));
    if (!g || inGame(g) || g.players.length >= g.need) return;
    g.players.push({ id:"me", name:S.user.name, ini:S.user.ini });
    COLORS[S.user.ini] = "#3C7A5A";
    g.msgs.push({ from:"me", text:S.user.name + " joined the game 👋", ago:0 });
    save();
    render();
    var full = g.players.length >= g.need;
    toast(full ? "You're in — that's a full game 🎉" : "You're in");
    var host = person(g.host);
    if (host) {
      setTimeout(function () {
        var line = full
          ? "Brilliant, that's us sorted. See you " + whenLabel(g.day).toLowerCase() + " 👊"
          : "Nice one, welcome aboard 👊";
        g.msgs.push({ from:g.host, text:line, ago:0 });
        if (!S.chats[g.host]) S.chats[g.host] = { msgs:[], unread:0, at:Date.now() };
        save();
        push("💬", host.first + " · " + g.title.split(" at ")[0], line, { name:"gchat", arg:g.id });

      }, 2200);

      [{ label:"I've booked it", act:"booked", id:id, cls:"green" },

  A.booked = function (el) {

  function grabPost() {
    var t = document.getElementById("p-title"); if (!t) return;
    S.post.title = t.value;
    S.post.need = parseInt(document.getElementById("p-need").value, 10) || 4;
    S.post.cost = parseFloat(document.getElementById("p-cost").value) || 0;
    S.post.venue = document.getElementById("p-venue").value;
    S.post.time = document.getElementById("p-time").value;
    S.post.day = parseInt(document.getElementById("p-day").value, 10) || 0;
    S.post.note = document.getElementById("p-note").value;

    S.post.activity = el.getAttribute("data-id");
    save(); render();
  };

  A["post-it"] = function () {
    var d = S.post;
    var title = (document.getElementById("p-title").value || "").trim();
    var need = parseInt(document.getElementById("p-need").value, 10) || 4;
    var cost = parseFloat(document.getElementById("p-cost").value) || 0;
    var venue = document.getElementById("p-venue").value;
    var time = document.getElementById("p-time").value;
    var dayOff = parseInt(document.getElementById("p-day").value, 10) || 0;
    var note = (document.getElementById("p-note").value || "").trim();
    if (!title) { toast("Give it a name"); document.getElementById("p-title").focus(); return; }

    var when = new Date(); when.setHours(0,0,0,0);
    when.setDate(when.getDate() + dayOff + 1);

    var g = {
      id: "u" + Date.now(),
      activity: d.activity, title: title, venue: venue, court: "Court 1",
      far: 1.2, day: when.getTime(), time: time, cost: cost, need: need,
      host: "me", players: [{ id:"me", name:S.user.name, ini:S.user.ini }],
      note: note, booked: false, paid: [], msgs: []
    };
    COLORS[S.user.ini] = "#3C7A5A";
    S.games.unshift(g);
    S.post = defaultPost(d.activity);
    save();
    stack = [];
    go("home", null, true);
    toast("Posted to " + (NEARBY[d.activity] || 0) + " people nearby");

    /* the loop closes: someone nearby answers */
    var candidates = PEOPLE.filter(function (p) {
      return p.plays.indexOf(g.activity) !== -1 && !g.players.some(function (x) { return x.id === p.id; });
    });
    if (candidates.length) {
      var first = candidates[0];
      setTimeout(function () {
        g.players.push(p2p(first.id));
        g.msgs.push({ from:first.id, text:"I'm in! Been looking for a game for weeks.", ago:0 });
        save();
        push("🙌", first.first + " is in", g.title + " · " + g.players.length + "/" + g.need + " players", { name:"game", arg:g.id });
        if (view.name === "home" || view.name === "game" || view.name === "gchat") render();
      }, 2600);
    }
    if (candidates.length > 1) {
      var second = candidates[1];
      setTimeout(function () {
        if (g.players.length >= g.need) return;
        g.players.push(p2p(second.id));
        save();
        push("🙌", second.first + " is in", g.title + " · " + g.players.length + "/" + g.need + " players", { name:"game", arg:g.id });
        if (view.name === "home" || view.name === "game" || view.name === "gchat") render();
      }, 7000);
    }
  };

  /* ---------------- events ---------------- */
  document.addEventListener("click", function (e) {
    var el = e.target.closest("[data-act],[data-go],[data-back]");
    if (!el) return;
    if (el.hasAttribute("data-back")) { e.preventDefault(); back(); return; }
    var act = el.getAttribute("data-act");
    if (act && A[act]) { e.preventDefault(); A[act](el); return; }
    var dest = el.getAttribute("data-go");
    if (dest) {
      e.preventDefault();
      if (TABS.some(function (t) { return t.id === dest; })) stack = [];
      go(dest, el.getAttribute("data-id"));
    }
  });

  document.addEventListener("submit", function (e) {
    var f = e.target.closest("[data-form]");
    if (!f) return;
    e.preventDefault();
    var kind = f.getAttribute("data-form");
    var id = f.getAttribute("data-id");
    var input = f.querySelector("input");
    var text = (input.value || "").trim();
    if (!text) return;
    input.value = "";

    if (kind === "msg") {
      if (!S.chats[id]) S.chats[id] = { msgs:[], unread:0, at:Date.now() };
      S.chats[id].msgs.push({ me:true, text:text });
      S.chats[id].at = Date.now();
      save(); render();
      var p = person(id);
      var pool = REPLIES[id] || ["👍"];
      var reply = pool[Math.min(S.chats[id].msgs.filter(function (m) { return !m.me; }).length, pool.length - 1)];
      setTimeout(function () {
        S.chats[id].msgs.push({ me:false, text:reply });
        S.chats[id].at = Date.now();
        if (view.name !== "chat" || view.arg !== id) S.chats[id].unread = (S.chats[id].unread || 0) + 1;
        save();
        if (view.name === "chat" && view.arg === id) render();
        else push("💬", p.name, reply, { name:"chat", arg:id });
      }, 1800);
    }

    if (kind === "gmsg") {
      var g = game(id);
      g.msgs.push({ from:"me", text:text, ago:0 });
      save(); render();
      var others = g.players.filter(function (x) { return x.id !== "me" && person(x.id); });
      if (others.length) {
        var who = others[0];
        setTimeout(function () {
          g.msgs.push({ from:who.id, text:(REPLIES[who.id] || ["👍"])[0], ago:0 });
          save();
          if (view.name === "gchat" && view.arg === id) render();
        }, 1900);
      }
    }
  });

  /* live clock */
  function clock() {
    var d = new Date(), h = d.getHours(), m = d.getMinutes();
    document.getElementById("clock").textContent = h + ":" + (m < 10 ? "0" : "") + m;
  }
  clock(); setInterval(clock, 20000);

  /* boot */
  S = load();
  if (!S.post && S.user) S.post = defaultPost(S.user.plays[0]);
  view = S.onboarded ? { name:"home", arg:null } : { name:"welcome", arg:null };
  if (S.user) COLORS[S.user.ini] = "#3C7A5A";
  render();
})();
</script>
