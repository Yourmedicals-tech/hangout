<title>Hangout — prototype</title>

<style>
  :root {
    --ink:#0F1512; --ink-2:#3D4A43; --ink-3:#6B7A72;
    --paper:#E8EAE4; --card:#FCFDFB; --card-2:#F1F3EE;
    --line:#C9CEC5; --line-soft:#DEE2DA;
    --accent:#E8452F; --accent-ink:#FFFFFF; --accent-wash:#FCE9E5;
    --court:#0B6E4F; --court-wash:#DDEDE5;
    --amber:#B26B00; --amber-wash:#F8EEDC;
    --bezel:#12180F;
    --shadow:0 1px 2px rgba(15,21,18,.06), 0 24px 60px -20px rgba(15,21,18,.35);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --ink:#E9ECE5; --ink-2:#A9B4AC; --ink-3:#7C8981;
      --paper:#0A0E0C; --card:#171F1A; --card-2:#1E2721;
      --line:#2C382F; --line-soft:#232D26;
      --accent:#FF6248; --accent-ink:#1A0B07; --accent-wash:#3A1A13;
      --court:#35BE8B; --court-wash:#1B3529;
      --amber:#E0A44A; --amber-wash:#3A2E15;
      --bezel:#000000;
      --shadow:0 1px 2px rgba(0,0,0,.5), 0 24px 60px -20px rgba(0,0,0,.8);
    }
  }
  :root[data-theme="dark"] {
    --ink:#E9ECE5; --ink-2:#A9B4AC; --ink-3:#7C8981;
    --paper:#0A0E0C; --card:#171F1A; --card-2:#1E2721;
    --line:#2C382F; --line-soft:#232D26;
    --accent:#FF6248; --accent-ink:#1A0B07; --accent-wash:#3A1A13;
    --court:#35BE8B; --court-wash:#1B3529;
    --amber:#E0A44A; --amber-wash:#3A2E15;
    --bezel:#000000;
    --shadow:0 1px 2px rgba(0,0,0,.5), 0 24px 60px -20px rgba(0,0,0,.8);
  }
  :root[data-theme="light"] {
    --ink:#0F1512; --ink-2:#3D4A43; --ink-3:#6B7A72;
    --paper:#E8EAE4; --card:#FCFDFB; --card-2:#F1F3EE;
    --line:#C9CEC5; --line-soft:#DEE2DA;
    --accent:#E8452F; --accent-ink:#FFFFFF; --accent-wash:#FCE9E5;
    --court:#0B6E4F; --court-wash:#DDEDE5;
    --amber:#B26B00; --amber-wash:#F8EEDC;
    --bezel:#12180F;
    --shadow:0 1px 2px rgba(15,21,18,.06), 0 24px 60px -20px rgba(15,21,18,.35);
  }

  * { box-sizing:border-box; }
  body {
    margin:0; min-height:100vh; background:var(--paper); color:var(--ink);
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing:antialiased; line-height:1.5;
    display:flex; align-items:center; justify-content:center;
  }
  #device {
    width:100%; max-width:390px; height:100vh; max-height:844px;
    background:var(--card); position:relative; overflow:hidden;
    display:flex; flex-direction:column;
  }
  @media (min-width:640px) and (min-height:700px) {
    body { padding:32px; }
    #device { border-radius:44px; box-shadow:var(--shadow); outline:10px solid var(--bezel); height:844px; }
  }

  .status { display:flex; justify-content:space-between; align-items:center;
    padding:14px 24px 2px; font-size:12px; font-weight:650; font-variant-numeric:tabular-nums; flex:none; }
  .status .r { display:flex; gap:4px; align-items:center; }
  .status .r i { width:3px; height:3px; border-radius:50%; background:currentColor; display:block; }
  .status .b { width:20px; height:10px; border:1.3px solid currentColor; border-radius:3px; position:relative; }
  .status .b::after { content:""; position:absolute; inset:1.6px; right:6px; background:currentColor; border-radius:1px; }

  .nav { flex:none; padding:6px 20px 10px; display:flex; align-items:center; gap:12px; min-height:48px; }
  .nav .titles { min-width:0; flex:1; }
  .nav h1 { margin:0; font-size:22px; font-weight:750; letter-spacing:-.025em; line-height:1.2;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .nav .sub { font-size:11.5px; color:var(--ink-3); font-weight:550;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .nav .back { font-size:26px; line-height:1; color:var(--ink-2); background:none; border:0;
    padding:0 2px 4px 0; cursor:pointer; font-family:inherit; flex:none; }
  .nav .act { background:none; border:0; font:inherit; font-size:14px; font-weight:700;
    color:var(--accent); cursor:pointer; flex:none; padding:0; white-space:nowrap; }

  main { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch;
    padding:2px 20px 20px; display:flex; flex-direction:column; gap:12px; }
  main.center { justify-content:center; text-align:center; align-items:center; }
  main::-webkit-scrollbar { width:0; }

  h2.sec { font-size:10.5px; font-weight:700; letter-spacing:.1em; text-transform:uppercase;
    color:var(--ink-3); margin:8px 0 -4px; display:flex; align-items:center; gap:8px; }
  h2.sec .rule { flex:1; height:1px; background:var(--line-soft); }
  p.copy { margin:0; font-size:14px; color:var(--ink-2); line-height:1.55; }
  p.copy b { color:var(--ink); }

  .btn { border:0; border-radius:999px; padding:14px 22px; font:inherit; font-size:15px; font-weight:700;
    letter-spacing:-.01em; background:var(--accent); color:var(--accent-ink); cursor:pointer;
    transition:transform .12s ease, opacity .15s ease; width:100%; }
  .btn:active { transform:scale(.97); }
  .btn:focus-visible { outline:2px solid var(--ink); outline-offset:2px; }
  .btn.sm { padding:9px 15px; font-size:12.5px; width:auto; }
  .btn.ghost { background:transparent; color:var(--ink); border:1px solid var(--line); }
  .btn.dark { background:var(--ink); color:var(--paper); }
  .btn.green { background:var(--court); color:#fff; }
  .btn.amber { background:var(--amber); color:#fff; }
  .btn.flat { background:transparent; color:var(--ink-3); font-weight:600; font-size:13px; padding:10px; }
  .btn[disabled] { opacity:.4; cursor:default; }

  .field { display:flex; flex-direction:column; gap:5px; }
  .field label { font-size:10.5px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-3); }
  .field input, .field select, .field textarea {
    font:inherit; font-size:16px; color:var(--ink); background:var(--card);
    border:1px solid var(--line); border-radius:12px; padding:13px 14px; width:100%;
    -webkit-appearance:none; appearance:none; }
  .field textarea { resize:none; min-height:60px; font-size:15px; }
  .field input:focus, .field select:focus, .field textarea:focus { outline:none; border-color:var(--ink); }
  .field input[disabled] { color:var(--ink-3); background:var(--card-2); }
  .field select { background-image:linear-gradient(45deg,transparent 50%,var(--ink-3) 50%),linear-gradient(135deg,var(--ink-3) 50%,transparent 50%);
    background-position:calc(100% - 18px) 21px, calc(100% - 13px) 21px;
    background-size:5px 5px, 5px 5px; background-repeat:no-repeat; }
  .field .hint { font-size:11.5px; color:var(--ink-3); line-height:1.45; }
  .field .hint b { color:var(--ink-2); }
  .two { display:flex; gap:10px; } .two > * { flex:1; min-width:0; }

  .pick { display:flex; align-items:center; gap:13px; width:100%; text-align:left;
    border:1.5px solid var(--line); border-radius:16px; padding:14px;
    background:var(--card); color:var(--ink); font:inherit; cursor:pointer;
    transition:border-color .15s ease, background .15s ease; }
  .pick[aria-pressed="true"] { border-color:var(--ink); background:var(--card-2); }
  .pick .ico { font-size:25px; line-height:1; flex:none; }
  .pick .t { min-width:0; flex:1; }
  .pick .t b { display:block; font-size:15.5px; font-weight:680; letter-spacing:-.01em; }
  .pick .t span { font-size:12px; color:var(--ink-2); display:block; line-height:1.4; }
  .pick .tick { margin-left:auto; width:22px; height:22px; border-radius:50%; flex:none;
    border:1.5px solid var(--line); display:grid; place-items:center; font-size:12px; color:transparent; }
  .pick[aria-pressed="true"] .tick { background:var(--ink); border-color:var(--ink); color:var(--paper); }

  .chips { display:flex; flex-wrap:wrap; gap:7px; }
  .chip { font:inherit; font-size:12.5px; font-weight:600; padding:8px 13px; border-radius:999px;
    border:1px solid var(--line); color:var(--ink-2); background:var(--card); cursor:pointer; }
  .chip[aria-pressed="true"] { background:var(--ink); border-color:var(--ink); color:var(--paper); }

  .gc { border:1px solid var(--line-soft); border-radius:18px; background:var(--card);
    padding:13px 14px; display:flex; flex-direction:column; gap:9px;
    cursor:pointer; text-align:left; font:inherit; color:var(--ink); width:100%;
    transition:transform .12s ease; }
  .gc:active { transform:scale(.985); }
  .gc.urgent { border-color:var(--accent); background:var(--accent-wash); }
  .gc.filled { border-color:var(--court); background:var(--court-wash); }
  .gc.ask { border-color:var(--amber); background:var(--amber-wash); cursor:default; }
  .gc .top { display:flex; align-items:center; gap:8px; }
  .gc .kind { font-size:10px; font-weight:700; letter-spacing:.07em; text-transform:uppercase; color:var(--ink-3); }
  .gc.urgent .kind { color:var(--accent); }
  .gc.filled .kind { color:var(--court); }
  .gc.ask .kind { color:var(--amber); }
  .gc .when { margin-left:auto; font-size:11.5px; color:var(--ink-3); font-weight:650; font-variant-numeric:tabular-nums; }
  .gc h3 { margin:0; font-size:16.5px; font-weight:700; letter-spacing:-.02em; line-height:1.25; }
  .gc .meta { font-size:12.5px; color:var(--ink-2); display:flex; gap:7px; align-items:center; flex-wrap:wrap; }
  .gc .meta i { width:3px; height:3px; border-radius:50%; background:var(--ink-3); display:block; flex:none; }
  .gc .foot { display:flex; align-items:center; gap:8px; }
  .gc .foot .btn { margin-left:auto; }
  .gc .pair { display:flex; gap:7px; width:100%; }
  .gc .pair .btn { flex:1; margin-left:0; }

  .rep { display:inline-flex; align-items:center; gap:3px; font-size:10px; font-weight:700;
    padding:2px 6px; border-radius:5px; background:var(--court-wash); color:var(--court); white-space:nowrap; }
  .rep.low { background:var(--amber-wash); color:var(--amber); }
  .rep.none { background:var(--card-2); color:var(--ink-3); }

  .slots { display:flex; align-items:center; }
  .slots > * + * { margin-left:-7px; }
  .pip { width:28px; height:28px; border-radius:50%; border:2px solid var(--card);
    display:grid; place-items:center; font-size:10.5px; font-weight:700; color:#fff;
    background:var(--ink-2); flex:none; }
  .gc.urgent .pip { border-color:var(--accent-wash); }
  .gc.filled .pip { border-color:var(--court-wash); }
  .gc.ask .pip { border-color:var(--amber-wash); }
  .pip.empty { background:transparent; border:2px dashed var(--accent); color:var(--accent); font-weight:500; font-size:14px; }
  .gc.filled .pip.empty { border:2px solid var(--court); background:var(--court); color:#fff; }
  .count { font-size:12.5px; font-weight:750; font-variant-numeric:tabular-nums; color:var(--ink-2); margin-left:5px; }
  .gc.urgent .count { color:var(--accent); }
  .gc.filled .count { color:var(--court); }

  @keyframes slidein { from{transform:translateY(-130%);opacity:0} to{transform:translateY(0);opacity:1} }
  @keyframes fadeup { from{transform:translateY(8px);opacity:0} to{transform:translateY(0);opacity:1} }
  main > * { animation:fadeup .3s ease both; }
  @media (prefers-reduced-motion:reduce) { *,main>* { animation:none!important; transition:none!important; } }

  .row { display:flex; align-items:center; gap:12px; width:100%; text-align:left;
    padding:11px 0; border:0; border-bottom:1px solid var(--line-soft);
    background:none; font:inherit; color:var(--ink); cursor:pointer; }
  .row:last-child { border-bottom:0; }
  .row .t { flex:1; min-width:0; }
  .row .t b { display:block; font-size:14.5px; font-weight:680; letter-spacing:-.01em; }
  .row .t span { display:block; font-size:12px; color:var(--ink-2); line-height:1.45;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .row .far { font-size:11.5px; color:var(--ink-3); font-weight:650; font-variant-numeric:tabular-nums; flex:none; }
  .av { width:42px; height:42px; border-radius:50%; flex:none; display:grid; place-items:center;
    color:#fff; font-weight:700; font-size:14px; }
  .av.sm { width:30px; height:30px; font-size:11px; }
  .tag { display:inline-block; font-size:10px; font-weight:650; padding:2px 7px; border-radius:5px;
    background:var(--card-2); color:var(--ink-2); white-space:nowrap; }
  .tag.new { background:var(--accent-wash); color:var(--accent); }
  .taglist { display:flex; gap:5px; flex-wrap:wrap; margin-top:4px; }
  .dot { width:8px; height:8px; border-radius:50%; background:var(--accent); flex:none; }

  .block { border:1px solid var(--line-soft); border-radius:16px; padding:13px 14px;
    display:flex; flex-direction:column; gap:9px; background:var(--card); }
  .block .bh { font-size:10px; font-weight:700; letter-spacing:.09em; text-transform:uppercase; color:var(--ink-3); }
  .lr { display:flex; justify-content:space-between; align-items:center; gap:8px;
    font-size:13.5px; color:var(--ink-2); font-variant-numeric:tabular-nums; }
  .lr b { color:var(--ink); font-weight:700; }
  .lr .name { flex:1; min-width:0; color:var(--ink); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .lr.total { border-top:1px solid var(--line-soft); padding-top:9px; font-size:15px; }

  .link { display:flex; align-items:center; justify-content:space-between; gap:10px; width:100%; text-align:left;
    font:inherit; font-size:14px; font-weight:650; color:var(--ink); cursor:pointer;
    border:1px solid var(--line); border-radius:14px; padding:12px 14px; background:var(--card); }
  .link small { display:block; font-size:11.5px; font-weight:500; color:var(--ink-3); margin-top:1px; }
  .link .arw { color:var(--ink-3); font-size:15px; flex:none; }
  .link .ic { font-size:19px; flex:none; }
  .link.done { border-color:var(--court); background:var(--court-wash); }
  .link.done .arw { color:var(--court); }
  .link.warn { border-color:var(--amber); background:var(--amber-wash); }

  .reach { background:var(--ink); color:var(--paper); border-radius:14px; padding:13px 15px; font-size:13px; line-height:1.5; }
  .reach b { font-weight:750; font-variant-numeric:tabular-nums; }
  .reach .btn { margin-top:11px; }

  .stile { display:flex; align-items:center; gap:12px; width:100%; text-align:left;
    border:1px solid var(--line-soft); border-radius:16px; padding:12px 13px;
    background:var(--card); color:var(--ink); font:inherit; cursor:pointer; }
  .stile .ico { font-size:26px; flex:none; }
  .stile .t { flex:1; min-width:0; }
  .stile .t b { display:block; font-size:15px; font-weight:700; letter-spacing:-.015em; }
  .stile .t span { display:block; font-size:11.5px; color:var(--ink-2); }
  .stile .arw { color:var(--ink-3); flex:none; }
  .stile.locked { border-style:dashed; cursor:default; flex-direction:column; align-items:stretch; gap:9px; }
  .stile.locked .ico { filter:grayscale(1); opacity:.6; }
  .stile .head { display:flex; align-items:center; gap:12px; width:100%; text-align:left;
    background:none; border:0; padding:0; font:inherit; color:var(--ink); cursor:pointer; }
  .stile-foot { display:flex; align-items:center; gap:10px; justify-content:space-between; }
  .stile-foot .note { margin:0; }

  .meter { display:block; height:5px; border-radius:999px; background:var(--line-soft); overflow:hidden; margin-top:6px; }
  .meter i { display:block; height:100%; background:var(--accent); border-radius:999px;
    transition:width .6s cubic-bezier(.3,1,.4,1); }
  .meter.close i { background:var(--amber); }

  .empty { display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:11px; text-align:center; flex:1; padding:24px 0; }
  .empty .mark { width:62px; height:62px; border-radius:50%; border:2px dashed var(--accent);
    color:var(--accent); display:grid; place-items:center; font-size:26px; font-weight:300; }
  .empty h3 { margin:6px 0 0; font-size:19px; font-weight:750; letter-spacing:-.02em; }
  .empty p { margin:0; font-size:13.5px; color:var(--ink-2); line-height:1.55; max-width:31ch; }
  .empty .btn { margin-top:8px; max-width:250px; }

  .thread { display:flex; flex-direction:column; gap:9px; padding-top:6px; }
  .msg { max-width:80%; padding:10px 13px; border-radius:18px; font-size:14px; line-height:1.45;
    background:var(--card-2); color:var(--ink); border-bottom-left-radius:5px; align-self:flex-start;
    animation:fadeup .25s ease both; }
  .msg.me { align-self:flex-end; background:var(--ink); color:var(--paper);
    border-bottom-left-radius:18px; border-bottom-right-radius:5px; }
  .msg.sys { align-self:center; background:transparent; color:var(--ink-3); font-size:11.5px;
    text-align:center; max-width:90%; padding:2px; font-weight:600; }
  .msg .who { display:block; font-size:10.5px; font-weight:700; opacity:.6; margin-bottom:2px; }
  .composer { flex:none; display:flex; gap:8px; align-items:center; padding:10px 20px 18px;
    border-top:1px solid var(--line-soft); }
  .composer input { flex:1; font:inherit; font-size:16px; color:var(--ink); background:var(--card-2);
    border:1px solid transparent; border-radius:999px; padding:11px 16px; -webkit-appearance:none; }
  .composer input:focus { outline:none; border-color:var(--line); }
  .composer button { background:none; border:0; font:inherit; font-size:14px; font-weight:750;
    color:var(--accent); cursor:pointer; padding:6px; flex:none; }

  .phead { display:flex; flex-direction:column; align-items:center; gap:6px; padding:8px 0 2px; }
  .phead .av { width:68px; height:68px; font-size:23px; }
  .phead b { font-size:20px; font-weight:750; letter-spacing:-.02em; }
  .phead span { font-size:12.5px; color:var(--ink-3); }
  .stats { display:flex; border:1px solid var(--line-soft); border-radius:14px; overflow:hidden; }
  .stats div { flex:1; text-align:center; padding:10px 3px; border-right:1px solid var(--line-soft); min-width:0; }
  .stats div:last-child { border-right:0; }
  .stats b { display:block; font-size:17px; font-weight:750; font-variant-numeric:tabular-nums; letter-spacing:-.02em; }
  .stats span { font-size:8.5px; color:var(--ink-3); font-weight:700; letter-spacing:.03em; }

  .toggle { width:44px; height:26px; border-radius:999px; background:var(--line); position:relative;
    flex:none; border:0; cursor:pointer; transition:background .18s ease; }
  .toggle::after { content:""; position:absolute; top:3px; left:3px; width:20px; height:20px; border-radius:50%;
    background:#fff; transition:transform .18s ease; box-shadow:0 1px 3px rgba(0,0,0,.25); }
  .toggle[aria-pressed="true"] { background:var(--court); }
  .toggle[aria-pressed="true"]::after { transform:translateX(18px); }

  nav.tabs { flex:none; display:flex; border-top:1px solid var(--line-soft); padding:8px 4px 20px; background:var(--card); }
  nav.tabs button { flex:1; background:none; border:0; font:inherit; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; gap:3px;
    font-size:9.5px; font-weight:650; color:var(--ink-3); padding:4px 0; position:relative; }
  nav.tabs button[aria-current="page"] { color:var(--ink); }
  nav.tabs svg { width:21px; height:21px; opacity:.5; }
  nav.tabs button[aria-current="page"] svg { opacity:1; }
  nav.tabs .badge { position:absolute; top:0; right:calc(50% - 16px); min-width:16px; height:16px; padding:0 4px;
    background:var(--accent); color:var(--accent-ink); border-radius:999px;
    font-size:9.5px; font-weight:750; display:grid; place-items:center; font-variant-numeric:tabular-nums; }

  .cta { flex:none; display:flex; align-items:center; gap:10px; padding:12px 20px 20px;
    border-top:1px solid var(--line-soft); background:var(--card); }
  .cta .price { font-size:11px; color:var(--ink-3); font-weight:650; flex:none; }
  .cta .price b { display:block; font-size:17px; color:var(--ink); font-weight:750; font-variant-numeric:tabular-nums; }
  .cta .btn { width:auto; flex:1; }

  #push { position:absolute; top:10px; left:12px; right:12px; z-index:50;
    background:var(--ink); color:var(--paper); border-radius:18px; padding:12px 14px;
    display:none; gap:11px; align-items:center; cursor:pointer; text-align:left;
    box-shadow:0 12px 32px -8px rgba(0,0,0,.5); border:0; font:inherit; width:calc(100% - 24px); }
  #push.show { display:flex; animation:slidein .35s cubic-bezier(.2,1,.3,1) both; }
  #push .ic { width:34px; height:34px; border-radius:10px; background:var(--accent); color:var(--accent-ink);
    display:grid; place-items:center; font-size:16px; flex:none; }
  #push .t { min-width:0; }
  #push .t b { display:block; font-size:13px; font-weight:700; }
  #push .t span { display:block; font-size:12px; opacity:.75; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

  #toast { position:absolute; bottom:96px; left:50%; transform:translateX(-50%);
    background:var(--ink); color:var(--paper); padding:11px 18px; border-radius:999px;

  function needsAnswer() {
    return S.games.filter(function (g) {
      return g.repeats && isRegular(g) && !inGame(g) && g.out.indexOf("me") === -1 && isLive(g.sport) && !g.cancelled;
    });
  }
  function reliability(p) {
    var r = (p && p.record) || { played:0, missed:0 };
    var total = r.played + r.missed;
    if (!total) return { txt:"New", cls:"none" };
    return { txt:r.played + " of " + total, cls:(r.played / total >= 0.85 ? "" : "low") };
  }

  /* ---------------- shell ---------------- */
  var root = document.getElementById("root");
  var view = { name:"welcome", arg:null };
  var stack = [];
  function go(name, arg, replace) {
    if (!replace && !(view.name === name && view.arg === arg)) stack.push({ name:view.name, arg:view.arg });
    view = { name:name, arg:arg };
    render();
  }
  function back() { view = stack.pop() || { name:"home", arg:null }; render(); }

  var TABS = [
    { id:"home",   label:"Near you", icon:'<path d="M3 10l9-7 9 7v10a1 1 0 01-1 1h-5v-7H9v7H4a1 1 0 01-1-1z"/>' },
    { id:"sports", label:"Sports",   icon:'<circle cx="12" cy="12" r="9"/><path d="M12 3a15 15 0 010 18M3.5 9h17M3.5 15h17"/>' },
    { id:"people", label:"People",   icon:'<circle cx="9" cy="8" r="3"/><path d="M3 20a6 6 0 0112 0M17 11a3 3 0 100-6M21 20a6 6 0 00-4-5.6"/>' },
    { id:"chats",  label:"Chats",    icon:'<path d="M21 15a3 3 0 01-3 3H8l-5 3V6a3 3 0 013-3h12a3 3 0 013 3z"/>' },
    { id:"you",    label:"You",      icon:'<circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0116 0"/>' }
  ];
  function tabs(active) {
    var u = unread();
    return '<nav class="tabs">' + TABS.map(function (t) {
      return '<button data-go="' + t.id + '"' + (t.id === active ? ' aria-current="page"' : "") + ">" +
        (t.id === "chats" && u ? '<span class="badge">' + u + "</span>" : "") +
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">' +
        t.icon + "</svg>" + t.label + "</button>";
    }).join("") + "</nav>";
  }
  function nav(o) {
    return '<div class="nav">' +
      (o.back ? '<button class="back" data-back="1" aria-label="Back">‹</button>' : "") +
      '<div class="titles"><h1>' + o.title + "</h1>" + (o.sub ? '<div class="sub">' + o.sub + "</div>" : "") + "</div>" +
      (o.action ? '<button class="act" data-act="' + o.action.act + '"' +
        (o.action.id ? ' data-id="' + o.action.id + '"' : "") + ">" + o.action.label + "</button>" : "") + "</div>";
  }
  function avatar(ini, cls) {
    return '<span class="av ' + (cls || "") + '" style="background:' + (COLORS[ini] || "#5C6B62") + '">' + esc(ini) + "</span>";
  }

  /* ---------------- screens ---------------- */
  var V = {};

  V.welcome = function () {
    return '<main class="center" style="gap:15px; padding:0 28px">' +
      '<p class="brand">hang<em>out</em></p>' +
      '<p class="copy" style="max-width:26ch">Somebody near you is one player short. Find them.</p>' +
      '<div style="height:14px"></div>' +
      '<button class="btn" data-go="signup">Create an account</button>' +
      '<button class="btn ghost" data-act="demo-signin">I\'ve already got one</button>' +
      '<p class="note" style="margin-top:12px">Prototype · Leicester · 2 sports live, 6 waiting to open</p>' +
      "</main>";
  };

  V.signup = function () {
    return nav({ title:"Create your account", sub:"Two minutes, then you're in", back:true }) +
      "<main>" +
      '<div class="field"><label for="f-name">Your name</label><input id="f-name" type="text" placeholder="Shiv" autocomplete="given-name"></div>' +
      '<div class="field"><label for="f-email">Email</label><input id="f-email" type="email" placeholder="you@email.com" autocomplete="email"></div>' +
      '<div class="field"><label for="f-pass">Password</label><input id="f-pass" type="password" placeholder="••••••••"></div>' +
      '<p class="copy" style="font-size:12px">We only ever show your first name and a rough distance. Never your address.</p>' +
      '<div style="flex:1; min-height:8px"></div>' +
      '<button class="btn" data-act="signup">Continue</button></main>';
  };

  V.pick = function () {
    var sel = S.draft.plays;
    var live = sportIds().filter(function (id) { return SPORTS[id].live; });
    var soon = sportIds().filter(function (id) { return !SPORTS[id].live; });

    function tile(id, live) {
      var s = sp(id), on = sel.indexOf(id) !== -1;
      var sub = live
        ? plural(S.demand[id], "person", "people") + " play this within 10 miles"
        : S.demand[id] + " of " + s.threshold + " people needed near you";
      var meter = live ? "" : '<span class="meter' + (S.demand[id] / s.threshold > 0.8 ? " close" : "") +
        '"><i style="width:' + Math.min(100, Math.round(S.demand[id] / s.threshold * 100)) + '%"></i></span>';
      return '<button class="pick" data-act="toggle-play" data-id="' + id + '" aria-pressed="' + on + '">' +
        '<span class="ico">' + s.emoji + '</span><span class="t"><b>' + s.name + "</b><span>" + sub + "</span>" +
        meter + '</span><span class="tick">✓</span></button>';
    }

    return nav({ title:"What do you play?", sub:"Pick everything you'd turn up for", back:true }) +
      "<main>" +
      '<h2 class="sec">Live near you<span class="rule"></span></h2>' +
      live.map(function (id) { return tile(id, true); }).join("") +
      '<h2 class="sec">Not open here yet<span class="rule"></span></h2>' +
      '<p class="copy" style="font-size:12.5px">A sport switches on when enough people nearby want it. Pick them anyway — you get counted, and told the moment it opens.</p>' +
      soon.map(function (id) { return tile(id, false); }).join("") +
      '<div style="flex:1; min-height:10px"></div>' +
      '<button class="btn" data-act="to-place"' + (sel.length ? "" : " disabled") + ">Continue</button></main>";
  };

  V.place = function () {
    var d = S.draft;
    return nav({ title:"Where are you?", sub:"So we only show you what's close", back:true }) +
      "<main>" +
      '<div class="field"><label for="f-pc">Postcode district</label>' +
      '<input id="f-pc" type="text" value="' + esc(d.pc) + '" autocapitalize="characters">' +
      '<span class="hint">Just the first half — <b>LE18</b>, not the full postcode. It\'s all we need and all we store.</span></div>' +
      '<div class="field"><label for="f-rad">Show me games within</label><select id="f-rad">' +
      [3, 5, 10, 15, 25].map(function (m) {
        return '<option value="' + m + '"' + (m === d.radius ? " selected" : "") + ">" + m + " miles</option>";
      }).join("") + "</select></div>" +
      '<button class="pick" data-act="toggle-new" aria-pressed="' + d.isNew + '">' +
      '<span class="ico">👋</span><span class="t"><b>I\'m new to the area</b>' +
      "<span>Shows a badge, so others in your shoes can find you</span></span><span class=\"tick\">✓</span></button>" +
      '<div style="flex:1; min-height:10px"></div>' +
      '<button class="btn" data-act="to-levels">Continue</button></main>';
  };

  V.levels = function () {
    var d = S.draft;
    var need = d.plays.filter(function (id) { return sp(id).levels; });
    return nav({ title:"How good are you?", sub:"Honestly. It makes games better, not worse.", back:true }) +
      "<main>" +
      '<p class="copy">In racket sports, a mismatched fourth quietly ruins the session for everyone — and nobody says anything, they just stop coming. So we ask.</p>' +
      need.map(function (id) {
        var s = sp(id);
        return '<div class="field"><label>' + s.emoji + " " + s.name + "</label><div class=\"chips\">" +
          s.levelNames.map(function (l) {
            return '<button class="chip" data-act="set-level" data-id="' + id + '" data-v="' + l + '" aria-pressed="' +
              (d.levels[id] === l) + '">' + l + "</button>";
          }).join("") + "</div></div>";
      }).join("") +
      '<p class="copy" style="font-size:12.5px">It\'s per sport. You can be decent at one and hopeless at another — most people are.</p>' +
      '<div style="flex:1; min-height:10px"></div>' +
      '<button class="btn" data-act="finish">Find my people</button></main>';
  };

  V.home = function () {
    var gs = feed();
    var ask = needsAnswer();
    var askIds = ask.map(function (g) { return g.id; });
    var open = gs.filter(function (g) { return spotsLeft(g) > 0 && !inGame(g) && askIds.indexOf(g.id) === -1; });
    var mine = gs.filter(function (g) { return inGame(g); });
    var full = gs.filter(function (g) { return spotsLeft(g) <= 0 && !inGame(g); });

    var body;
    if (!gs.length && !ask.length) {
      var pool = myLiveSports().reduce(function (a, id) { return a + (S.demand[id] || 0); }, 0);
      body = '<main><div class="empty"><div class="mark">+</div><h3>No games yet</h3>' +
        "<p>You're early. There are <b>" + plural(pool, "person", "people") + "</b> within " + S.user.radius +
        " miles who play what you play, and none of them have posted either.</p>" +
        '<button class="btn" data-act="new-game">Post the first game</button>' +
        '<button class="btn ghost" data-go="people" style="max-width:250px">See who\'s nearby</button></div></main>';
    } else {
      body = "<main>" +
        (ask.length  ? '<h2 class="sec">This week<span class="rule"></span></h2>'      + ask.map(askCard).join("") : "") +
        (open.length ? '<h2 class="sec">Needs a player<span class="rule"></span></h2>' + open.map(card).join("")   : "") +
        (mine.length ? '<h2 class="sec">You\'re playing<span class="rule"></span></h2>'+ mine.map(card).join("")   : "") +
        (full.length ? '<h2 class="sec">Full<span class="rule"></span></h2>'           + full.map(card).join("")   : "") +
        '<p class="note" style="margin-top:10px">' + plural(gs.length, "game") + " within " + S.user.radius +
        " miles of " + esc(S.user.pc) + " · " +
        myLiveSports().map(function (id) { return sp(id).name.toLowerCase(); }).join(" and ") + "</p></main>";
    }
    return nav({ title:"Near you", sub:"Within " + S.user.radius + " miles of " + esc(S.user.pc),
      action:{ act:"new-game", label:"+ Post" } }) + body + tabs("home");
  };

  /* the weekly "are you in?" card — the recurring-game loop */
  function askCard(g) {
    var s = sp(g.sport), v = venue(g.venueId);
    return '<div class="gc ask">' +
      '<div class="top"><span class="kind">Your regular · in this week?</span>' +
      '<span class="when">' + whenLabel(g.day) + " · " + g.time + "</span></div>" +
      "<h3>" + s.emoji + " " + esc(g.title) + "</h3>" +
      '<div class="meta">' + esc(v.name) + "<i></i>" + g.players.length + " in so far<i></i>" +
      (spotsLeft(g) > 0 ? plural(spotsLeft(g), "spot") + " left" : "full") + "</div>" +
      '<div class="foot"><div class="pair">' +
      '<button class="btn sm" data-act="join" data-id="' + g.id + '">I\'m in</button>' +
      '<button class="btn sm ghost" data-act="out" data-id="' + g.id + '">Can\'t make it</button>' +
      "</div></div></div>";
  }

  function card(g) {
    var s = sp(g.sport), v = venue(g.venueId);
    var left = spotsLeft(g), mine = inGame(g), waiting = onList(g);
    var cls = g.cancelled ? "" : (left > 0 ? "urgent" : "filled");
    var kind = g.cancelled ? "Called off"
      : left > 0 ? plural(left, "spot") + " left"
      : mine ? "Full · you're playing"
      : waiting ? "Full · you're on the waitlist"
      : "Full";

    var pips = g.players.slice(0, 3).map(function (p) {
      return '<span class="pip" style="background:' + (COLORS[p.ini] || "#5C6B62") + '">' + esc(p.ini) + "</span>";
    }).join("");
    if (g.players.length > 3) pips += '<span class="pip" style="background:var(--ink-2)">+' + (g.players.length - 3) + "</span>";
    pips += left > 0 ? '<span class="pip empty">+</span>' : '<span class="pip empty">✓</span>';

    var btn;
    if (mine)         btn = '<button class="btn sm ghost" data-go="game" data-id="' + g.id + '">Open</button>';
    else if (left > 0)btn = '<button class="btn sm" data-act="join" data-id="' + g.id + '">I\'m in</button>';
    else if (waiting) btn = '<button class="btn sm ghost" data-go="game" data-id="' + g.id + '">Waiting</button>';
    else              btn = '<button class="btn sm ghost" data-act="wait" data-id="' + g.id + '">Waitlist</button>';

    var bits = [s.name, v.far + " mi", g.cost ? money(myShare(g)) + " each" : "Free"];
    if (g.repeats) bits.push("Every " + dowOf(g.day).toLowerCase());
    if (g.beginners) bits.push("Beginners ok");

    return '<button class="gc ' + cls + '" data-go="game" data-id="' + g.id + '">' +
      '<div class="top"><span class="kind">' + kind + "</span>" +
      '<span class="when">' + whenLabel(g.day) + " · " + g.time + "</span></div>" +
      "<h3>" + s.emoji + " " + esc(g.title) + "</h3>" +
      '<div class="meta">' + bits.join("<i></i>") + "</div>" +
      '<div class="foot"><div class="slots">' + pips + "</div>" +
      '<span class="count">' + g.players.length + "/" + g.need + "</span>" + btn + "</div></button>";
  }

  V.game = function (id) {
    var g = game(id);
    if (!g) return V.home();
    var s = sp(g.sport), v = venue(g.venueId);
    var mine = inGame(g), waiting = onList(g), left = spotsLeft(g);
    var host = person(g.host) || { first:"the host" };
    var per = share(g);

    var pips = g.players.map(function (p) {
      return '<span class="pip" style="background:' + (COLORS[p.ini] || "#5C6B62") + '">' + esc(p.ini) + "</span>";
    }).join("") + (left > 0 ? '<span class="pip empty">+</span>' : "");

    /* roster with reliability — what makes a stranger safe to accept */
    var roster = g.players.map(function (p) {
      var pp = person(p.id);
      var r = reliability(pp);
      var lvl = pp && pp.levels && pp.levels[g.sport] ? '<span class="tag">' + esc(pp.levels[g.sport]) + "</span>" : "";
      return '<div class="lr">' + avatar(p.ini, "sm") +
        '<span class="name">' + esc(p.id === "me" ? "You" : p.name) +
        (g.host === p.id ? " · host" : "") + "</span>" + lvl +
        '<span class="rep ' + r.cls + '">' + r.txt + "</span></div>";
    }).join("");

    /* sides — only if the host asked for them, and they balance at any count */
    var teams = "";
    if (g.teams && g.players.length) {
      var a = [], b = [];
      g.players.forEach(function (p, i) { (i % 2 ? b : a).push(p.name); });
      var perSide = Math.floor(g.need / 2);
      teams = '<div class="block"><span class="bh">Sides · aiming for ' + perSide + " a side</span>" +
        '<div class="lr"><span class="name">Bibs</span><b>' + esc(a.join(", ") || "—") + "</b></div>" +
        '<div class="lr"><span class="name">Non-bibs</span><b>' + esc(b.join(", ") || "—") + "</b></div>" +
        '<p class="note left">Sides rebalance as people join and drop out. Uneven is fine — it usually is.</p></div>';
    }

    var waitBlock = g.waitlist.length
      ? '<div class="block"><span class="bh">Waitlist · first in, first on</span>' +
        g.waitlist.map(function (wid, i) {
          var pp = person(wid);
          return '<div class="lr">' + avatar(pp.ini, "sm") +
            '<span class="name">' + esc(wid === "me" ? "You" : pp.name) + "</span>" +
            '<span class="tag">#' + (i + 1) + "</span></div>";
        }).join("") +
        '<p class="note left">If someone drops out, the top of the list is in automatically. Nobody has to ask.</p></div>'
      : "";

    /* money — the honest version: the host is the one out of pocket.
       Cost comes from the GAME, not the sport: park cricket is free, nets are £24. */
    var costBlock = "";
    if (g.cost > 0) {
      var owedToHost = g.players.filter(function (p) { return g.paid.indexOf(p.id) === -1; }).length * per;
      costBlock = '<div class="block"><span class="bh">Cost</span>' +
        '<div class="lr"><span class="name">' + esc(g.court) + " hire</span><b>" + money(g.cost) + "</b></div>" +
        '<div class="lr"><span class="name">Split ' + plural(g.players.length, "way") + "</span><b>" + money(per) + " each</b></div>" +
        (g.hostPaid && owedToHost > 0
          ? '<div class="lr total"><span class="name">' + esc(g.host === "me" ? "You are" : host.first + " is") +
            ' out of pocket</span><b style="color:var(--amber)">' + money(owedToHost) + "</b></div>"
          : '<div class="lr total"><span class="name">' + (mine ? "You pay" : "You'd pay") + "</span><b>" + money(myShare(g)) + "</b></div>") +
        "</div>";
    }

    var payBlock = "";
    if (g.cost > 0 && g.booked) {
      payBlock = '<div class="block"><span class="bh">Who\'s paid · ' + money(per) + " each</span>" +
        g.players.map(function (p) {
          var paid = g.paid.indexOf(p.id) !== -1;
          var right = paid ? '<b style="color:var(--court)">Paid ✓</b>'
            : p.id === "me" ? '<button class="btn sm green" data-act="pay" data-id="' + g.id + '">Pay ' + money(per) + "</button>"
            : '<span style="color:var(--ink-3)">Waiting</span>';
          return '<div class="lr">' + avatar(p.ini, "sm") +
            '<span class="name">' + esc(p.id === "me" ? "You" : p.name) + "</span>" + right + "</div>";
        }).join("") +
        (g.host === "me"
          ? '<button class="btn sm ghost" data-act="nudge" data-id="' + g.id + '" style="width:100%">Nudge whoever hasn\'t paid</button>'
          : '<p class="note left">' + esc(host.first) + " paid the venue up front. We don't hold your money — this just pays them back.</p>") +
        "</div>";
    }

    var bookRow;
    if (g.cost === 0) {
      bookRow = '<div class="link done"><span class="ic">✓</span><div style="flex:1">Free to play' +
        "<small>" + esc(v.name) + " · no booking, no money</small></div></div>";
    } else if (g.booked) {
      bookRow = '<div class="link done"><span class="ic">✓</span><div style="flex:1">Booked' +
        "<small>" + esc(v.name) + " · " + esc(g.court) + "</small></div></div>";
    } else {
      bookRow = '<button class="link" data-act="book" data-id="' + g.id + '"><span class="ic">📍</span>' +
        '<div style="flex:1">Book it at ' + esc(v.name) +
        "<small>Opens their site — we don't take bookings</small></div><span class=\"arw\">↗</span></button>";
    }

    var weatherRow = (s.weather && !g.cancelled)
      ? '<button class="link warn" data-act="weather" data-id="' + g.id + '"><span class="ic">🌧</span>' +
        '<div style="flex:1">Outdoor game<small>If it\'s off, one tap tells all ' + g.players.length + ' of them at once</small></div></button>'
      : "";

    var cancelled = g.cancelled
      ? '<div class="link warn"><span class="ic">🌧</span><div style="flex:1">Called off<small>Everyone was told the moment it was called</small></div></div>'
      : "";

    return nav({ title:s.emoji + " " + g.title,
        sub:whenLabel(g.day) + " · " + g.time + (g.repeats ? " · every " + dowOf(g.day).toLowerCase() : ""),
        back:true, action:{ act:"share", id:g.id, label:"Share" } }) +
      "<main>" +
      cancelled +
      '<div class="block"><span class="bh">' + s.name + " · hosted by " + esc(g.host === "me" ? "you" : host.first) +
      (g.repeats ? " · repeats weekly" : "") + "</span>" +
      '<div class="lr" style="font-size:14px"><span class="name">' + esc(v.name) + "</span><b>" + v.far + " mi</b></div>" +
      '<div class="taglist">' +
      (g.beginners ? '<span class="tag new">Beginners welcome</span>' : "") +
      (g.level !== "any" ? '<span class="tag">' + esc(g.level) + " and up</span>" : "") +
      '<span class="tag">' + s.duration + " min</span><span class=\"tag\">" + cap(s.setting) + "</span>" +
      (s.season !== "year-round" ? '<span class="tag">' + cap(s.season) + "</span>" : "") + "</div>" +
      (g.note ? '<p class="copy" style="font-size:13px">' + esc(g.note) + "</p>" : "") + "</div>" +

      '<div class="block"><span class="bh">Playing · ' + g.players.length + " of " + g.need + "</span>" +
      '<div class="slots" style="padding:2px 0">' + pips + "</div>" + roster +
      (g.regulars.length
        ? '<p class="note left">' + plural(g.regulars.length, "regular") + ". " +
          (g.out.length ? g.out.map(function (o) { return esc((person(o) || {}).first || "Someone"); }).join(", ") +
            " can't make it this week." : "Everyone's answered.") + "</p>"
        : "") + "</div>" +

      teams + waitBlock + costBlock + bookRow + weatherRow + payBlock +

      '<button class="link" data-go="gchat" data-id="' + g.id + '"><span class="ic">💬</span>' +
      '<div style="flex:1">Chat<small>' +
      (g.msgs.length ? plural(g.msgs.length, "message") : "No messages yet") + "</small></div><span class=\"arw\">›</span></button>" +

      '<button class="link" data-go="sport" data-id="' + g.sport + '"><span class="ic">' + s.emoji + "</span>" +
      '<div style="flex:1">New to ' + s.name.toLowerCase() + "?<small>Rules, kit, and " +
      (s.guides.length ? plural(s.guides.length, "short video") : "where to play") + "</small></div><span class=\"arw\">›</span></button>" +

      (mine && g.repeats && !isRegular(g)
        ? '<button class="btn ghost" data-act="regular" data-id="' + g.id + '">Make me a regular</button>' : "") +
      (mine ? '<button class="btn flat" data-act="leave" data-id="' + g.id + '">Leave this game</button>' : "") +
      "</main>" +

      '<div class="cta">' +
      (g.cost > 0 ? '<div class="price">Your share<b>' + money(myShare(g)) + "</b></div>" : "") +
      (mine ? '<button class="btn green" disabled>You\'re in ✓</button>'
        : left > 0 ? '<button class="btn" data-act="join" data-id="' + g.id + '">I\'m in</button>'
        : waiting ? '<button class="btn amber" data-act="unwait" data-id="' + g.id + '">On the waitlist · leave</button>'
        : '<button class="btn dark" data-act="wait" data-id="' + g.id + '">Join the waitlist</button>') +
      "</div>";
  };

  V.gchat = function (id) {
    var g = game(id);
    if (!g) return V.home();
    var msgs = g.msgs.map(function (m) {
      if (m.sys) return '<div class="msg sys">' + esc(m.text) + "</div>";
      var mine = m.from === "me";
      var p = person(m.from);

      '<div class="field"><label for="p-title">What is it?</label>' +

  /* SPORTS TAB — what's live, and the demand board for everything that isn't */
  V.sports = function () {

    return nav({ title:"Sports", sub:"Near " + esc(S.user.pc) }) + "<main>" +
      '<h2 class="sec">Live near you<span class="rule"></span></h2>' +

        return '<button class="stile" data-go="sport" data-id="' + id + '">' +
          '<span class="ico">' + s.emoji + '</span><span class="t"><b>' + s.name + "</b><span>" +
          plural(S.demand[id], "player") + " · " + plural(n, "game") + " · " + plural(venuesFor(id).length, "venue") +
          "</span></span><span class=\"arw\">›</span></button>";
      }).join("") +

      '<h2 class="sec">Waiting to open<span class="rule"></span></h2>' +
      '<p class="copy" style="font-size:12.5px">A sport only switches on when enough people near you want it. Four padel players in ten miles isn\'t a sport, it\'s an empty court. <b>Add your name and it counts.</b></p>' +

      locked.map(function (id) {
        var s = sp(id), d = S.demand[id], t = s.threshold;

        var want = S.wanted.indexOf(id) !== -1;
        var togo = t - d;
        return '<div class="stile locked">' +
          /* tappable: you can read all about it — you just can't play it yet */

          '<span class="t"><b>' + s.name + "</b><span>" + d + " of " + t + " people near " + esc(S.user.pc) +

          '<span class="arw">›</span></button>' +
          '<span class="meter' + (pct > 80 ? " close" : "") + '"><i style="width:' + pct + '%"></i></span>' +
          '<div class="stile-foot">' +
          (want ? '<span class="tag new">You\'re counted · we\'ll be in touch</span>'

      (live && players.length

  V.request = function (id) {

  function hostReply(g, full) {
    if (g.host === "me") return;
    var host = person(g.host);

    setTimeout(function () {
      var line = full ? "That's us sorted. See you " + whenLabel(g.day).toLowerCase() + " 👊" : "Nice one, welcome aboard 👊";

      (v.price ? "£" + v.price + " per " + v.unit : "free, no booking") + "</p>" +
      "<p>Does " + v.sports.map(function (s) { return sp(s).emoji + " " + sp(s).name.toLowerCase(); }).join(", ") + ".</p>" +
      "<p>We keep every venue near you on file before we have a single player. It's why the app can always tell you " +
      "<em>where</em> you could play, even when it can't yet tell you who with.</p>" +
      (v.price ? "<code>" + esc(v.name.toLowerCase().replace(/[^a-z]+/g, "")) + ".co.uk/book</code>" : "") +
      btns([{ label:"Post a game here", act:"post-here", id:v.id },
            { label:"Close", act:"close-sheet", cls:"ghost" }]));
  };
  A["post-here"] = function (el) {
    var v = venue(el.getAttribute("data-id"));
    var mineLive = myLiveSports();
    var s = v.sports.filter(function (x) { return isLive(x) && mineLive.indexOf(x) !== -1; })[0];
    if (!s) { closeSheet(); toast("None of your sports are open at that venue yet"); return; }
    S.post = defaultPost(s);
    S.post.venueId = v.id;
    S.post.cost = v.price;
    save(); closeSheet(); go("post");
  };
  A.video = function () { toast("Embedded YouTube — not wired up in the prototype"); };
  A["close-sheet"] = function () { closeSheet(); };

  /* --- demand capture: the threshold that launches a sport ---
     Used by both the Sports tab and onboarding, so a sport can never sit
     at 20/20 and still be locked. */
  function countMeIn(id) {
    if (S.wanted.indexOf(id) !== -1) return false;
    S.wanted.push(id);
    S.demand[id] += 1;
    if (S.user && S.user.plays.indexOf(id) === -1) S.user.plays.push(id);
    if (SPORTS[id].live || S.unlocked.indexOf(id) !== -1) return false;
    if (S.demand[id] < SPORTS[id].threshold) return false;
    S.unlocked.push(id);
    seedGameFor(id);
    return true;   /* you were the one who tipped it over */
  }

  function celebrate(id) {
    var s = sp(id);
    sheet('<div class="big">' + s.emoji + "</div><h3>" + s.name + " just went live in " + esc(S.user.pc) + "</h3>" +
      "<p>You were number " + s.threshold + ". That's the threshold — enough people near " + esc(S.user.pc) +
      " that a shout actually gets answered.</p>" +
      "<p>This is the whole rule. A sport doesn't exist here until it has the density to work, because otherwise every new " +
      "sport just splits your neighbours across more empty rooms.</p>" +
      "<p>The first game is already up, and the other " + (s.threshold - 1) + " people have been told.</p>" +
      btns([{ label:"See " + s.name.toLowerCase() + " near me", act:"goto-sport", id:id },
            { label:"Later", act:"close-sheet", cls:"ghost" }]));
    setTimeout(function () {
      push(s.emoji, s.name + " is live near you",
        s.threshold + " of " + s.threshold + " people · first game up at " + venuesFor(id)[0].name, { name:"sport", arg:id });
    }, 6500);
  }

  A.want = function (el) {
    var id = el.getAttribute("data-id"), s = sp(id);
    if (S.wanted.indexOf(id) !== -1) return;
    var unlocked = countMeIn(id);

    /* the tap isn't just a counter — it puts a human request in front of a human */
    S.requests.unshift({ id:"r" + Date.now(), name:S.user.name, ini:S.user.ini, pc:S.user.pc,
      sport:id, ago:"just now", mine:true, msgs:[] });
    save(); render();

    if (unlocked) { setTimeout(function () { celebrate(id); }, 350); return; }

    toast("Counted — and we've told the team");
    setTimeout(function () {
      sheet('<div class="big">' + s.emoji + "</div><h3>You're number " + S.demand[id] + "</h3>" +
        "<p>" + s.name + " needs " + plural(s.threshold - S.demand[id], "more person", "more people") +
        " near " + esc(S.user.pc) + " before it opens. You'll be told the moment it does.</p>" +
        "<p>Your request has also gone straight to the Hangout team — a real person sees it, and can come back to you. " +
        "It's how we work out which sport to open next, and exactly where.</p>" +
        btns([{ label:"Read about " + s.name.toLowerCase() + " anyway", act:"goto-sport", id:id },
              { label:"Done", act:"close-sheet", cls:"ghost" }]));
    }, 700);
  };

  A.broadcast = function (el) {
    var id = el.getAttribute("data-id"), s = sp(id);
    var n = S.requests.filter(function (x) { return x.sport === id; }).length;
    closeSheet();
    toast("Message sent to all " + n + " waiting on " + s.name.toLowerCase());
  };
  A["goto-sport"] = function (el) { closeSheet(); go("sport", el.getAttribute("data-id")); };

  function seedGameFor(id) {
    var s = sp(id), v = venuesFor(id)[0];
    var cands = PEOPLE.filter(function (p) { return p.plays.indexOf(id) !== -1; });
    var starters = cands.slice(0, Math.max(1, Math.min(cands.length, defaultNeed(id) - 3)));
    if (!starters.length) starters = [PEOPLE[2]];
    S.games.unshift({
      id:"seed-" + id, sport:id,
      title:id === "football" ? "Sunday five-a-side" : "First " + s.name.toLowerCase() + " session",
      venueId:v.id, court:s.teams ? "Pitch 2" : "Court 1",
      day:nextDow(id === "football" ? 0 : 6), time:"6:30pm",
      cost:v.price, need:defaultNeed(id), teams:!!s.teams,
      host:starters[0].id, repeats:true, regulars:starters.map(function (p) { return p.id; }),
      players:starters.map(function (p) { return p2p(p.id); }), waitlist:[], out:[],
      level:"any", beginners:true, cancelled:false,
      note:"The first one since " + s.name.toLowerCase() + " opened here. Everyone's new to it — come along.",
      booked:false, hostPaid:false, paid:[],
      msgs:[{ sys:true, text:s.name + " went live in " + S.user.pc }]
    });
  }

  /* --- post --- */
  function grabPost() {
    var t = document.getElementById("p-title");
    if (!t) return;
    var d = S.post;
    d.title = t.value;
    var n = document.getElementById("p-need"); if (n) d.need = parseInt(n.value, 10) || d.need;
    var c = document.getElementById("p-cost");
    d.cost = c ? (parseFloat(c.value) || 0) : 0;   /* no cost input = a free venue */
    d.venueId = document.getElementById("p-venue").value;
    d.time = document.getElementById("p-time").value;
    d.day = parseInt(document.getElementById("p-day").value, 10) || 0;
    d.note = document.getElementById("p-note").value;
  }
  /* changing the venue re-prices the game — a park is free, the nets are not */
  document.addEventListener("change", function (e) {
    if (!e.target || e.target.id !== "p-venue" || view.name !== "post") return;
    grabPost();
    S.post.cost = venue(S.post.venueId).price;
    save(); render();
  });
  A["post-sport"] = function (el) {
    grabPost();
    var keep = { title:S.post.title, note:S.post.note, repeats:S.post.repeats, beginners:S.post.beginners };
    S.post = defaultPost(el.getAttribute("data-id"));
    S.post.title = keep.title; S.post.note = keep.note;
    S.post.repeats = keep.repeats; S.post.beginners = keep.beginners;
    save(); render();
  };
  A["post-need"]      = function (el) { grabPost(); S.post.need = parseInt(el.getAttribute("data-v"), 10); save(); render(); };
  A["post-teams"]     = function ()   { grabPost(); S.post.teams = !S.post.teams; save(); render(); };
  A["post-level"]     = function (el) { grabPost(); S.post.level = el.getAttribute("data-v"); save(); render(); };
  A["post-repeat"]    = function ()   { grabPost(); S.post.repeats = !S.post.repeats; save(); render(); };
  A["post-beginners"] = function ()   { grabPost(); S.post.beginners = !S.post.beginners; save(); render(); };

  A["post-it"] = function () {
    grabPost();
    var d = S.post, s = sp(d.sport);
    if (!d.title.trim()) { toast("Give it a name"); return; }
    var when = new Date(); when.setHours(0, 0, 0, 0);
    when.setDate(when.getDate() + d.day + 1);

    var g = {
      id:"u" + Date.now(), sport:d.sport, title:d.title.trim(), venueId:d.venueId,
      court:s.teams ? "Pitch 1" : "Court 1",
      day:when.getTime(), time:d.time,
      cost:d.cost,
      need:d.need,
      teams:!!d.teams,
      host:"me", repeats:d.repeats, regulars:d.repeats ? ["me"] : [],
      players:[{ id:"me", name:S.user.name, ini:S.user.ini }], waitlist:[], out:[],
      level:d.level, beginners:d.beginners, note:d.note.trim(),
      booked:false, hostPaid:false, paid:[], cancelled:false, msgs:[]
    };
    S.games.unshift(g);
    S.post = defaultPost(d.sport);
    save(); stack = []; go("home", null, true);
    toast("Posted to " + plural(S.demand[d.sport] || 0, "person", "people") + " nearby");

    var cands = PEOPLE.filter(function (p) { return p.plays.indexOf(g.sport) !== -1; })
      .sort(function (a, b) { return a.far - b.far; });
    [[2600, 0], [7000, 1], [12000, 2]].forEach(function (pair) {
      var p = cands[pair[1]];
      if (!p) return;
      setTimeout(function () {
        if (spotsLeft(g) <= 0 || g.players.some(function (x) { return x.id === p.id; })) return;
        g.players.push(p2p(p.id));
        g.msgs.push({ from:p.id, text:pair[1] === 0 ? "I'm in! Been looking for a game for weeks." : "Count me in 👍" });
        save();
        push("🙌", p.first + " is in", g.title + " · " + g.players.length + "/" + g.need + " players", { name:"game", arg:g.id });
        if (view.name === "home" || view.name === "game" || view.name === "gchat") render();
      }, pair[0]);
    });
  };

  /* --- share: a public link that needs no account --- */
  A.share = function (el) {
    var g = game(el.getAttribute("data-id"));
    if (!g) return;
    sheet('<div class="big">🔗</div><h3>Share this game</h3>' +
      "<p>Anyone can open this link — no app, no account, nothing to install. They see the game, and signing up is what happens " +
      "<em>after</em> they've decided to come.</p>" +
      "<p>That's how you grow inside the WhatsApp groups that already exist, instead of trying to replace them.</p>" +
      "<code>hangout.app/g/" + esc(g.id) + "</code>" +
      btns([{ label:"Copy link", act:"copy" }, { label:"Close", act:"close-sheet", cls:"ghost" }]));
  };
  A.copy = function () { closeSheet(); toast("Link copied — paste it in the group chat"); };

  /* --- settings --- */
  A.pfilter = function (el) { S.peopleFilter = el.getAttribute("data-id"); save(); render(); };
  A.notify = function () { S.notify = !S.notify; save(); render(); toast(S.notify ? "Pings on" : "Pings off"); };
  A.radius = function () {
    sheet("<h3>Search radius</h3>" +
      "<p>How far would you genuinely travel for a game? Be honest — a badminton court 25 miles away is a game you won't go to.</p>" +
      btns([3, 5, 10, 15, 25].map(function (m) {
        return { label:m + " miles" + (S.user.radius === m ? "  ✓" : ""), act:"set-radius", id:String(m),
          cls:S.user.radius === m ? "dark" : "ghost" };
      })));
  };
  A["set-radius"] = function (el) {
    S.user.radius = parseInt(el.getAttribute("data-id"), 10);
    save(); closeSheet(); render();
    toast("Showing games within " + S.user.radius + " miles");
  };
  A.reset = function () {
    sheet("<h3>Reset the prototype?</h3>" +
      "<p>Wipes your account, your games, your messages and every sport you unlocked. Back to a blank Leicester.</p>" +
      btns([{ label:"Reset it", act:"do-reset" }, { label:"Cancel", act:"close-sheet", cls:"ghost" }]));
  };
  A["do-reset"] = function () {
    closeSheet(); S = fresh(); save(); stack = [];
    view = { name:"welcome", arg:null }; render();
  };

  /* ---------------- events ---------------- */
  document.addEventListener("click", function (e) {
    var el = e.target.closest("[data-act],[data-go],[data-back]");
    if (!el) return;
    if (el.hasAttribute("data-back")) { e.preventDefault(); back(); return; }
    var act = el.getAttribute("data-act");
    if (act && A[act]) { e.preventDefault(); A[act](el); return; }
    var dest = el.getAttribute("data-go");
    if (dest) {
      e.preventDefault();
      if (TABS.some(function (t) { return t.id === dest; })) stack = [];
      go(dest, el.getAttribute("data-id"));
    }
  });

  document.addEventListener("submit", function (e) {
    var f = e.target.closest("[data-form]");
    if (!f) return;
    e.preventDefault();
    var kind = f.getAttribute("data-form"), id = f.getAttribute("data-id");
    var input = f.querySelector("input");
    var text = (input.value || "").trim();
    if (!text) return;
    input.value = "";

    if (kind === "msg") {
      if (!S.chats[id]) S.chats[id] = { msgs:[], unread:0, at:Date.now() };
      S.chats[id].msgs.push({ me:true, text:text });
      S.chats[id].at = Date.now();
      save(); render();
      var p = person(id);
      var pool = REPLIES[id] || ["👍"];
      var i = Math.min(S.chats[id].msgs.filter(function (m) { return !m.me; }).length, pool.length - 1);
      setTimeout(function () {
        S.chats[id].msgs.push({ me:false, text:pool[i] });
        S.chats[id].at = Date.now();
        if (!(view.name === "chat" && view.arg === id)) S.chats[id].unread = (S.chats[id].unread || 0) + 1;
        save();
        if (view.name === "chat" && view.arg === id) render();
        else push("💬", p.name, pool[i], { name:"chat", arg:id });
      }, 1800);
    }

    if (kind === "reply") {
      var r = null;
      for (var j = 0; j < S.requests.length; j++) if (S.requests[j].id === id) r = S.requests[j];
      if (!r) return;
      r.msgs.push({ admin:true, text:text });
      save(); render();
      toast("Sent to " + r.name.split(" ")[0]);
      if (!r.mine) {
        setTimeout(function () {
          r.msgs.push({ admin:false, text:"Thanks — appreciate you coming back to me. I'll keep an eye out." });
          save();
          if (view.name === "request" && view.arg === id) render();
        }, 2000);
      }
      return;
    }

    if (kind === "gmsg") {
      var g = game(id);
      g.msgs.push({ from:"me", text:text });
      save(); render();
      var others = g.players.filter(function (x) { return x.id !== "me" && REPLIES[x.id]; });
      if (!others.length) return;
      var who = others[0];
      setTimeout(function () {
        g.msgs.push({ from:who.id, text:REPLIES[who.id][0] });
        save();
        if (view.name === "gchat" && view.arg === id) render();
        else push("💬", who.name + " · " + g.title, REPLIES[who.id][0], { name:"gchat", arg:id });
      }, 1900);
    }
  });

  function clock() {
    var d = new Date(), h = d.getHours(), m = d.getMinutes();
    document.getElementById("clock").textContent = h + ":" + (m < 10 ? "0" : "") + m;
  }
  clock(); setInterval(clock, 20000);

  /* ---------------- boot ---------------- */
  S = load();
  if (!S.demand)   S.demand = JSON.parse(JSON.stringify(DEMAND_SEED));
  if (!S.wanted)   S.wanted = [];
  if (!S.unlocked) S.unlocked = [];
  if (!S.requests) S.requests = seedRequests();
  if (!S.chats)    S.chats = {};
  if (!S.peopleFilter) S.peopleFilter = "all";
  if (S.user) {
    COLORS[S.user.ini] = "#3C7A5A";
    if (!S.user.record) S.user.record = { played:0, missed:0 };
    if (!S.user.levels) S.user.levels = {};
    if (!S.post || myLiveSports().indexOf(S.post.sport) === -1) {
      S.post = defaultPost(myLiveSports()[0] || "badminton");
    }
  }
  view = S.onboarded ? { name:"home", arg:null } : { name:"welcome", arg:null };
  render();
})();
</script>
